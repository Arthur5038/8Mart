<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Квест Артура для Алины</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-layer bg-1" aria-hidden="true"></div>
    <div class="bg-layer bg-2" aria-hidden="true"></div>
    <div class="bg-layer bg-3" aria-hidden="true"></div>

    <main class="app" aria-labelledby="appTitle">
      <header class="glass panel header-panel">
        <div>
          <h1 id="appTitle">Квест от Артура для Алины</h1>
          <p class="subtitle">10 шагов, немного романтики, немного безумия.</p>
        </div>

        <div class="status-grid">
          <p id="stepLabel" class="status-item">Шаг 1/10</p>
          <p id="scoreLabel" class="status-item">Очки: 0/100</p>
        </div>

        <div
          class="progress"
          role="progressbar"
          aria-label="Прогресс"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
        >
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </header>

      <section id="stage" class="stage" aria-live="polite"></section>

      <footer id="navigation" class="glass panel nav-panel">
        <button id="backBtn" class="btn" type="button">Назад</button>
        <button id="nextBtn" class="btn btn-primary" type="button" disabled>Дальше</button>
      </footer>
    </main>

    <p id="srLive" class="sr-only" aria-live="polite"></p>

    <script src="script.js" defer></script>
  </body>
</html>
