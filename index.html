<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Квест 8 Марта</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb bg-orb-1" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-2" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-3" aria-hidden="true"></div>

    <main class="app-shell" id="app">
      <header class="app-header glass-panel">
        <div class="header-meta">
          <p id="stepCounter" class="meta-text">Шаг 1/10</p>
          <p id="scoreCounter" class="meta-text">Очки: 0/100</p>
        </div>
        <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Прогресс квеста">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </header>

      <section id="stage" class="stage" aria-live="polite"></section>

      <footer class="nav-panel glass-panel" id="navPanel">
        <button type="button" id="backBtn" class="btn btn-secondary">Назад</button>
        <button type="button" id="nextBtn" class="btn btn-primary" disabled>Дальше</button>
      </footer>
    </main>

    <p id="liveRegion" class="sr-only" aria-live="polite"></p>

    <script src="script.js" defer></script>
  </body>
</html>
